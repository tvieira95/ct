name: Build with vcpkg

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

on:
  push:
    branches:
      - main
      - 'fix/**'
      - 'feat/**'

    paths:
      - .github/workflows/build-vcpkg.yml
      - cmake/**
      - src/**
      - CMakeLists.txt
      - vcpkg.json

  pull_request:
    paths:
      - .github/workflows/build-vcpkg.yml
      - cmake/**
      - src/**
      - CMakeLists.txt
      - vcpkg.json

jobs:
  build-windows:
    name: Windows
    runs-on: windows-2022

    env:
      # x-gha foi removido do vcpkg -> usar cache em pasta (files) + actions/cache.
      VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/vcpkg_cache
      VCPKG_BINARY_SOURCES: "clear;files,${{ github.workspace }}/vcpkg_cache,readwrite"
      # sccache: cache dos objetos do codigo (so o arquivo alterado recompila)
      SCCACHE_DIR: ${{ github.workspace }}/sccache
      SCCACHE_GHA_ENABLED: "false"

    steps:
      - uses: actions/checkout@v4

      - name: Get latest CMake
        uses: lukka/get-cmake@v4.3.2

      - name: Create vcpkg binary cache directory
        run: mkdir -p "${{ github.workspace }}/vcpkg_cache"
        shell: bash

      - name: Restore vcpkg binary cache
        uses: actions/cache/restore@v5
        with:
          path: ${{ github.workspace }}/vcpkg_cache
          key: vcpkg-bincache-${{ hashFiles('vcpkg.json') }}-${{ github.run_id }}
          restore-keys: |
            vcpkg-bincache-${{ hashFiles('vcpkg.json') }}-
            vcpkg-bincache-

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.6

      - name: Create sccache directory
        run: mkdir -p "${{ github.workspace }}/sccache"
        shell: bash

      - name: Restore sccache
        uses: actions/cache/restore@v5
        with:
          path: ${{ github.workspace }}/sccache
          key: sccache-windows-${{ github.run_id }}
          restore-keys: |
            sccache-windows-

      # cmd + vcvars64: garante o ambiente MSVC completo nos subprocessos que o
      # vcpkg dispara pra buildar as portas (glew falhava com 'CMAKE_C_COMPILER not
      # set' quando o ambiente era so exportado via msvc-dev-cmd + cmake cru).
      - name: Setup MSVC, build vcpkg deps and AstraClient
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          if not exist vcpkg git clone https://github.com/microsoft/vcpkg vcpkg
          call vcpkg\bootstrap-vcpkg.bat
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_C_COMPILER=cl -DCMAKE_CXX_COMPILER=cl -DCMAKE_C_COMPILER_LAUNCHER=sccache -DCMAKE_CXX_COMPILER_LAUNCHER=sccache -DCMAKE_TOOLCHAIN_FILE=%GITHUB_WORKSPACE%\vcpkg\scripts\buildsystems\vcpkg.cmake
          cmake --build build --parallel %NUMBER_OF_PROCESSORS%

      # Salva mesmo em falha: as 90 deps compilam antes do erro de compile do codigo,
      # entao a proxima run as restaura e pula direto pro compile (~20min -> ~minutos).
      - name: Save vcpkg binary cache
        if: always()
        uses: actions/cache/save@v5
        with:
          path: ${{ github.workspace }}/vcpkg_cache
          key: vcpkg-bincache-${{ hashFiles('vcpkg.json') }}-${{ github.run_id }}

      - name: Save sccache
        if: always()
        uses: actions/cache/save@v5
        with:
          path: ${{ github.workspace }}/sccache
          key: sccache-windows-${{ github.run_id }}

      - name: Upload build logs
        uses: actions/upload-artifact@v4
        with:
          name: logs-windows-${{ github.sha }}
          path: ${{ github.workspace }}/vcpkg/buildtrees/**/*.log
        if: ${{ failure() }}

      - name: Upload artifact binary
        uses: actions/upload-artifact@v4
        with:
          name: astraclient-windows-${{ github.sha }}
          path: |
            ${{ github.workspace }}/build/AstraClient.exe
            ${{ github.workspace }}/build/*.dll

  build-linux:
    name: Linux
    runs-on: ubuntu-latest

    env:
      VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/vcpkg_cache
      VCPKG_BINARY_SOURCES: "clear;files,${{ github.workspace }}/vcpkg_cache,readwrite"
      SCCACHE_DIR: ${{ github.workspace }}/sccache
      SCCACHE_GHA_ENABLED: "false"

    steps:
      - uses: actions/checkout@v4

      - name: Get latest CMake
        uses: lukka/get-cmake@v4.3.2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential ninja-build pkg-config autoconf automake libtool \
            python3 zip unzip tar curl git \
            libgl1-mesa-dev libglu1-mesa-dev libx11-dev libxext-dev libxrandr-dev \
            libxi-dev libxcursor-dev libxinerama-dev libxrender-dev libxfixes-dev \
            libxxf86vm-dev libasound2-dev

      - name: Create vcpkg binary cache directory
        run: mkdir -p "${{ github.workspace }}/vcpkg_cache"

      - name: Restore vcpkg binary cache
        uses: actions/cache/restore@v5
        with:
          path: ${{ github.workspace }}/vcpkg_cache
          key: vcpkg-bincache-linux-${{ hashFiles('vcpkg.json') }}-${{ github.run_id }}
          restore-keys: |
            vcpkg-bincache-linux-${{ hashFiles('vcpkg.json') }}-
            vcpkg-bincache-linux-

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.6

      - name: Create sccache directory
        run: mkdir -p "${{ github.workspace }}/sccache"

      - name: Restore sccache
        uses: actions/cache/restore@v5
        with:
          path: ${{ github.workspace }}/sccache
          key: sccache-linux-${{ github.run_id }}
          restore-keys: |
            sccache-linux-

      - name: Bootstrap vcpkg, configure and build
        run: |
          if [ ! -d vcpkg ]; then git clone https://github.com/microsoft/vcpkg vcpkg; fi
          ./vcpkg/bootstrap-vcpkg.sh -disableMetrics
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER_LAUNCHER=sccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=sccache \
            -DCMAKE_TOOLCHAIN_FILE="$GITHUB_WORKSPACE/vcpkg/scripts/buildsystems/vcpkg.cmake"
          cmake --build build --parallel "$(nproc)"

      - name: Save vcpkg binary cache
        if: always()
        uses: actions/cache/save@v5
        with:
          path: ${{ github.workspace }}/vcpkg_cache
          key: vcpkg-bincache-linux-${{ hashFiles('vcpkg.json') }}-${{ github.run_id }}

      - name: Save sccache
        if: always()
        uses: actions/cache/save@v5
        with:
          path: ${{ github.workspace }}/sccache
          key: sccache-linux-${{ github.run_id }}

      - name: Upload build logs
        uses: actions/upload-artifact@v4
        with:
          name: logs-linux-${{ github.sha }}
          path: ${{ github.workspace }}/vcpkg/buildtrees/**/*.log
        if: ${{ failure() }}

      - name: Upload artifact binary
        uses: actions/upload-artifact@v4
        with:
          name: astraclient-linux-${{ github.sha }}
          path: ${{ github.workspace }}/build/AstraClient
          if-no-files-found: warn
